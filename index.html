<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Darling's Kitchen — Catálogo</title>
<link rel="icon" type="image/jpeg" href="soy_DARLING.jpg">
<link rel="apple-touch-icon" href="soy_DARLING.jpg">
<meta name="theme-color" content="#0a0805">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0805;--dark:#141008;--rich:#1c160e;
  --gold:#c9963a;--gold-light:#e8b85a;--cream:#faf5ea;
  --text:#2a2018;--muted:#7a6a50;--border:rgba(201,150,58,0.25);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);max-width:440px;margin:0 auto;overflow-x:hidden}

.header-banner { width: 100%; line-height: 0; }
.header-banner img { width: 100%; height: auto; display: block; }

.search-wrap{background:var(--rich);padding:10px 15px;position:sticky;top:0;z-index:100}
.search-inner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.1);border:1px solid var(--border);border-radius:30px;padding:8px 15px}
.search-inner input{flex:1;background:none;border:none;outline:none;color:white;font-size:14px}

.price-list-trigger {
  display: block; margin: 10px 15px; padding: 12px; background: var(--gold);
  color: var(--black); text-align: center; border-radius: 10px;
  font-weight: 700; text-decoration: none; font-size: 14px; box-shadow: 0 4px 10px rgba(201,150,58,0.3);
}

.cats-scroll{display:flex;gap:10px;padding:15px;overflow-x:auto;background:var(--cream);scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 20px;background:white;border:1px solid var(--border);border-radius:20px;white-space:nowrap;font-size:13px;cursor:pointer;transition:0.3s}
.cat-btn.active{background:var(--black);color:var(--gold);border-color:var(--gold)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 15px 100px}
.card{background:white;border-radius:var(--r);overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.05);border:1px solid var(--border);cursor:pointer}
.card-img{width:100%;aspect-ratio:1/1;background:#eee;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-info{padding:10px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;height:36px;overflow:hidden}
.card-price{color:var(--gold);font-weight:700;font-size:14px;margin-top:5px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.overlay.open{display:flex}

.gallery-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; }
.gallery-overlay.open { display: flex; }
.gallery-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
.gallery-content { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; align-items: center; gap: 15px; padding: 20px; }
.gallery-content img { scroll-snap-align: center; max-width: 90%; max-height: 75vh; object-fit: contain; border-radius: 10px; }
.gallery-footer { color:white; text-align:center; padding:15px; font-size:12px; opacity: 0.8; }

.modal-form{background:var(--cream);width:100%;max-width:380px;border-radius:20px;padding:25px;max-height:90vh;overflow-y:auto}
input, select, textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid var(--border);font-family:inherit}
.btn-main{width:100%;padding:14px;background:var(--black);color:var(--gold);border-radius:10px;font-weight:700;cursor:pointer;border:none}
#imgPreview{width:100px;height:100px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:none;border:2px solid var(--gold)}

.view-card{background:white;width:100%;max-width:350px;border-radius:20px;overflow:hidden;animation:pop 0.3s ease}
.view-img img{width:100%;aspect-ratio:1.2/1;object-fit:cover}
.view-content{padding:20px}
.btn-wa{width:100%;background:#25d366;color:white;border:none;padding:12px;border-radius:10px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px}

.admin-only{display:none}
body.is-admin .admin-only{display:flex}
.fab-add{position:fixed;bottom:30px;right:20px;background:var(--black);color:var(--gold);width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);z-index:200;align-items:center;justify-content:center;font-size:30px;box-shadow:0 4px 15px rgba(0,0,0,0.4)}

@keyframes pop{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div class="header-banner">
    <img src="HeaderPage.jpg" alt="Soy Darling Banner">
</div>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" id="searchInput" placeholder="¿Qué se te antoja hoy?">
  </div>
</div>

<a href="#" class="price-list-trigger" onclick="openPriceGallery(event)">📖 VER LISTAS DE PRECIOS</a>

<div class="cats-scroll" id="catBar">
  <button class="cat-btn active" onclick="setCat('Todos')">Todos</button>
  <button class="cat-btn" onclick="setCat('Bocadillos')">Bocadillos</button>
  <button class="cat-btn" onclick="setCat('Postres')">Postres</button>
  <button class="cat-btn" onclick="setCat('Comidas')">Comidas</button>
  <button class="cat-btn" onclick="setCat('Bebidas')">Bebidas</button>
  <button class="cat-btn" onclick="setCat('Eventos')">Eventos</button>
</div>

<div class="grid" id="mainGrid"></div>

<div class="overlay" id="adminOverlay" onclick="closeOverlays(event)">
  <div class="modal-form" onclick="event.stopPropagation()">
    <h3 id="formTitle" style="margin-bottom:15px; font-family:serif">Producto</h3>
    <div style="text-align:center"><img id="imgPreview" src=""></div>
    <input type="text" id="fName" placeholder="Nombre">
    <input type="text" id="fPrice" placeholder="Precio">
    
    <select id="fCat">
      <option value="Bocadillos">Bocadillos</option>
      <option value="Postres">Postres</option>
      <option value="Comidas">Comidas</option>
      <option value="Bebidas">Bebidas</option>
      <option value="Eventos">Eventos</option>
    </select>
    
    <textarea id="fDesc" placeholder="Descripción" rows="3"></textarea>
    <p style="font-size:12px; margin-bottom:5px; color:var(--muted)">Foto (Cámara o Galería):</p>
    <input type="file" id="fImg" accept="image/*" style="border:none; padding:0">
    <button class="btn-main" id="btnSave">GUARDAR CAMBIOS</button>
    <button id="btnDel" class="admin-only" style="width:100%; background:none; border:none; color:red; margin-top:15px">Eliminar Producto</button>
  </div>
</div>

<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <span style="font-family:serif; font-size:18px">Nuestras Listas de Precios</span>
    <button onclick="closePriceGallery()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer">&times;</button>
  </div>
  
  <div class="gallery-content" id="galleryItems">
    <img src="ListaPrecio/ARROZES.jpeg" alt="Arroces">
    <img src="ListaPrecio/BOCADILLOS.jpeg" alt="Bocadillos">
    <img src="ListaPrecio/GOURMET.jpeg" alt="Gourmet">
    <img src="ListaPrecio/PASTAS.jpeg" alt="Pastas">
    <img src="ListaPrecio/PASTELES.jpeg" alt="Pasteles">
    <img src="ListaPrecio/POLLO.jpeg" alt="Pollo">
    <img src="ListaPrecio/POSTRES.jpeg" alt="Postres">
    <img src="ListaPrecio/RES.jpeg" alt="Res">
    <img src="ListaPrecio/VARIADOS.jpeg" alt="Variados">
    <img src="ListaPrecio/PRESENTACION.jpg" alt="Quienes Somos">
    <img src="ListaPrecio/AGREDECIMIENTO.jpg" alt="Gracias">
  </div>

  <div class="gallery-footer">
    ◀ Desliza para ver más categorías ▶
  </div>
</div>

<div class="overlay" id="viewOverlay" onclick="closeOverlays(event)">
  <div class="view-card" onclick="event.stopPropagation()">
    <div class="view-img"><img id="vImg" src=""></div>
    <div class="view-content">
      <h2 id="vTitle" style="font-family:serif">Nombre</h2>
      <div id="vPrice" style="color:var(--gold); font-weight:700; margin-bottom:10px">C$ 0</div>
      <p id="vDesc" style="font-size:14px; color:gray; margin-bottom:15px"></p>
      <div style="background:var(--cream); padding:15px; border-radius:12px">
        <textarea id="clientNote" placeholder="Nota para tu pedido..." rows="2"></textarea>
        <button class="btn-wa" id="btnSendWA">PEDIR POR WHATSAPP</button>
      </div>
      <button onclick="document.getElementById('viewOverlay').classList.remove('open')" style="width:100%; background:none; border:none; margin-top:15px; color:gray">Cerrar</button>
    </div>
  </div>
</div>

<button class="fab-add admin-only" id="btnAdd">+</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbd-LPbyW8ugPDbga0700sYRFbKTjxaHo",
    authDomain: "soy-darling.firebaseapp.com",
    projectId: "soy-darling",
    storageBucket: "soy-darling.firebasestorage.app",
    messagingSenderId: "365948585235",
    appId: "1:365948585235:web:f67789b233fd68d0e206e6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "productos");

  let localItems = [], filterCat = "Todos", editingId = null, compressedImg = "";

  const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
  if(isAdmin) document.body.classList.add('is-admin');

  onSnapshot(colRef, (snap) => {
    localItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  function render() {
    const grid = document.getElementById('mainGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = localItems.filter(i => (filterCat === "Todos" || i.cat === filterCat) && i.name.toLowerCase().includes(search));
    grid.innerHTML = filtered.map(i => `
      <div class="card" onclick="handleItemClick('${i.id}')">
        <div class="card-img"><img src="${i.img || ''}"></div>
        <div class="card-info">
          <div class="card-title">${i.name}</div>
          <div class="card-price">${i.price}</div>
        </div>
      </div>
    `).join('');
  }

  window.handleItemClick = (id) => { isAdmin ? openEdit(id) : openView(id); };

  function openView(id) {
    const i = localItems.find(x => x.id === id);
    document.getElementById('vImg').src = i.img;
    document.getElementById('vTitle').innerText = i.name;
    document.getElementById('vPrice').innerText = i.price;
    document.getElementById('vDesc').innerText = i.desc || "";
    document.getElementById('viewOverlay').classList.add('open');
    document.getElementById('btnSendWA').onclick = () => {
      const txt = `Hola Darling's Kitchen! Me interesa: *${i.name}* (${i.price}).\nNota: ${document.getElementById('clientNote').value}`;
      window.open(`https://wa.me/50557031282?text=${encodeURIComponent(txt)}`, '_blank');
    };
  }

  function openEdit(id) {
    editingId = id;
    const i = localItems.find(x => x.id === id);
    document.getElementById('fName').value = i.name;
    document.getElementById('fPrice').value = i.price;
    document.getElementById('fDesc').value = i.desc || "";
    document.getElementById('fCat').value = i.cat || "Bocadillos";
    compressedImg = i.img;
    document.getElementById('imgPreview').src = i.img;
    document.getElementById('imgPreview').style.display = i.img ? "inline-block" : "none";
    document.getElementById('formTitle').innerText = "Editar Producto";
    document.getElementById('adminOverlay').classList.add('open');
  }

  document.getElementById('btnAdd').onclick = () => {
    editingId = null; compressedImg = "";
    document.getElementById('fName').value = "";
    document.getElementById('fPrice').value = "";
    document.getElementById('fDesc').value = "";
    document.getElementById('imgPreview').style.display = "none";
    document.getElementById('formTitle').innerText = "Nuevo Producto";
    document.getElementById('adminOverlay').classList.add('open');
  };

  window.closeOverlays = (e) => {
    if(e.target.classList.contains('overlay')) {
      document.getElementById('viewOverlay').classList.remove('open');
      document.getElementById('adminOverlay').classList.remove('open');
    }
  };

  window.openPriceGallery = (e) => { e.preventDefault(); document.getElementById('galleryOverlay').classList.add('open'); };
  window.closePriceGallery = () => { document.getElementById('galleryOverlay').classList.remove('open'); };

  document.getElementById('fImg').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (ev) => {
      const img = new Image();
      img.src = ev.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const width = 800; 
        const scale = width / img.width;
        canvas.width = width;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        compressedImg = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreview').src = compressedImg;
        document.getElementById('imgPreview').style.display = "inline-block";
      };
    };
  };

  document.getElementById('btnSave').onclick = async () => {
    const data = {
      name: document.getElementById('fName').value,
      price: document.getElementById('fPrice').value,
      desc: document.getElementById('fDesc').value,
      cat: document.getElementById('fCat').value,
      img: compressedImg
    };
    if(editingId) await updateDoc(doc(db, "productos", editingId), data);
    else await addDoc(colRef, data);
    document.getElementById('adminOverlay').classList.remove('open');
  };

  document.getElementById('btnDel').onclick = async () => {
    if(confirm("¿Eliminar?")) {
      await deleteDoc(doc(db, "productos", editingId));
      document.getElementById('adminOverlay').classList.remove('open');
    }
  };

  window.setCat = (c) => {
    filterCat = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
    render();
  };
  document.getElementById('searchInput').oninput = render;
</script>
</body>
</html>
