<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Darling's Kitchen — Catálogo Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0805;--dark:#141008;--rich:#1c160e;
  --gold:#c9963a;--gold-light:#e8b85a;--gold-pale:#f5d990;
  --cream:#faf5ea;--warm:#f0e8d5;--text:#2a2018;--muted:#7a6a50;
  --border:rgba(201,150,58,0.25);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;max-width:440px;margin:0 auto;overflow-x:hidden}
.hero{background:var(--black);position:relative;overflow:hidden;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(201,150,58,.18) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(201,150,58,.1) 0%,transparent 50%),linear-gradient(180deg,#0a0805 0%,#1c160e 100%)}
.hero-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(201,150,58,.03) 40px,rgba(201,150,58,.03) 41px)}
.hero-content{position:relative;z-index:2;padding:28px 22px 26px;display:flex;align-items:flex-end;gap:16px}
.logo-circle{width:86px;height:86px;border-radius:50%;border:2.5px solid var(--gold);overflow:hidden;flex-shrink:0;box-shadow:0 0 0 4px rgba(201,150,58,.15),0 8px 32px rgba(0,0,0,.5)}
.logo-circle img{width:100%;height:100%;object-fit:cover;object-position:top center}
.hero-text{flex:1}
.hero-tagline{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;font-weight:600}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:32px;line-height:1;color:white;font-weight:700}
.hero-name span{color:var(--gold-light);font-style:italic}
.hero-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px;font-weight:300}
.gold-bar{width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent)}
.search-wrap{background:var(--rich);padding:12px 18px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.search-inner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:30px;padding:9px 16px}
.search-inner input{flex:1;background:none;border:none;outline:none;color:white;font-family:'Outfit',sans-serif;font-size:14px}
.search-inner input::placeholder{color:rgba(255,255,255,.3)}
.si{color:var(--gold);font-size:14px}
.cats-wrap{background:var(--dark);padding:14px 0 10px;border-bottom:1px solid var(--border)}
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 18px;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-pill{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;padding:8px 16px;border-radius:30px;border:1.5px solid rgba(201,150,58,.2);background:rgba(255,255,255,.04);transition:all .2s;min-width:76px}
.cat-pill.active{background:var(--gold);border-color:var(--gold)}
.cat-emoji{font-size:18px;line-height:1}
.cat-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.45);transition:color .2s}
.cat-pill.active .cat-label{color:#0a0805}
.add-bar{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.section-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.item-count{font-size:11px;background:var(--gold);color:white;padding:2px 8px;border-radius:20px;font-family:'Outfit',sans-serif;font-weight:600}
.btn-add{background:var(--black);color:var(--gold-pale);border:1.5px solid var(--border);border-radius:30px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-add:active{background:var(--gold);color:white}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 120px}
.food-card{background:white;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:transform .18s;position:relative;animation:fadeUp .35s ease both}
.food-card:active{transform:scale(0.97)}
.card-img{width:100%;aspect-ratio:1/1;background:var(--warm);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .no-img{font-size:40px;opacity:.5}
.card-cat-badge{position:absolute;top:7px;left:7px;background:var(--gold);color:white;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.card-body{padding:9px 11px 11px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.card-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:13px;font-weight:700;color:var(--gold)}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted)}
.empty .big-e{font-size:48px;margin-bottom:12px}
.detail-panel{position:fixed;inset:0;background:var(--cream);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-width:440px;left:50%;margin-left:-220px}
@media(max-width:440px){.detail-panel{left:0;margin-left:0}}
.detail-panel.open{transform:translateX(0)}
.detail-img-wrap{width:100%;aspect-ratio:4/3;background:var(--warm);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.detail-img-wrap img{width:100%;height:100%;object-fit:cover}
.detail-back,.detail-edit-btn{position:absolute;top:14px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);color:white;border:none;width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
.detail-back{left:14px}
.detail-edit-btn{right:14px;color:var(--gold-pale)}
.detail-cat-chip{display:inline-block;background:var(--gold);color:white;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.detail-content{padding:18px 20px 80px}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1.2;color:var(--text);margin:7px 0 3px}
.detail-price{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:12px}
.detail-desc{font-size:14px;line-height:1.7;color:var(--muted);border-top:1px solid var(--border);padding-top:12px}
.share-row{display:flex;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.share-btn{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.share-btn.wa{background:#25D366;color:white}
.share-btn.cp{background:var(--black);color:var(--gold-pale);border:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;max-width:440px;left:50%;margin-left:-220px}
@media(max-width:440px){.modal-overlay{left:0;margin-left:0}}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--cream);width:100%;border-radius:22px 22px 0 0;max-height:94vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:28px}
.modal-overlay.open .modal{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:rgba(0,0,0,.15);border-radius:2px;margin:12px auto 0}
.mheader{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700}
.mclose{background:none;border:none;font-size:21px;color:var(--muted);cursor:pointer}
.mbody{padding:16px 18px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fi,.fta,.fsel{width:100%;padding:10px 13px;background:white;border:1.5px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.fi:focus,.fta:focus,.fsel:focus{border-color:var(--gold)}
.fta{min-height:75px;resize:vertical}
.img-upload{width:100%;aspect-ratio:16/9;background:var(--warm);border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.img-upload:hover{border-color:var(--gold)}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-preview{position:absolute;inset:0;display:none}
.img-preview img{width:100%;height:100%;object-fit:cover}
.uhint{font-size:11px;color:var(--muted);text-align:center}
.uicon{font-size:26px}
.btn-save{width:100%;padding:13px;background:var(--black);color:var(--gold-pale);border:1.5px solid var(--gold);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-save:active{background:var(--gold);color:white}
.btn-del{width:100%;padding:11px;background:none;color:#c0392b;border:1.5px solid #c0392b;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.app-footer{background:var(--black);padding:22px 18px;text-align:center;border-top:1px solid var(--border)}
.footer-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.footer-photo{width:76px;height:76px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;box-shadow:0 0 0 4px rgba(201,150,58,.15)}
.footer-photo img{width:100%;height:100%;object-fit:cover;object-position:top}
.footer-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:white}
.footer-name span{color:var(--gold);font-style:italic}
.fdivider{width:36px;height:1px;background:var(--gold);margin:3px auto}
.ftagline{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.fcopy{font-size:9px;color:rgba(255,255,255,.18);margin-top:6px;letter-spacing:1px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--gold-pale);padding:9px 18px;border-radius:30px;font-size:13px;font-weight:500;border:1px solid var(--border);opacity:0;transition:all .3s;z-index:500;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

          <option value="Comidas">🍽️ Comidas</option>
          <option value="Postres">🍰 Postres</option>
          <option value="Pasteles">🎂 Pasteles</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Descripción</label>
        <textarea class="fta" id="fDesc" placeholder="Describe el plato, ingredientes especiales, porciones disponibles..."></textarea>
      </div>
      <div class="fg">
        <label class="fl">Precio (opcional)</label>
        <input type="text" class="fi" id="fPrice" placeholder="Ej: ₡3,500 · C$280 · $5.00">
      </div>
      <button class="btn-save" id="saveBtn">✦ Guardar en el catálogo</button>
      <button class="btn-del" id="deleteBtn" style="display:none">Eliminar preparación</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='darling_catalog_v1';
const CATS=[
  {id:'Todas',emoji:'✨',label:'Todas'},
  {id:'Bebidas',emoji:'🥤',label:'Bebidas'},
  {id:'Bocadillos',emoji:'🥪',label:'Bocadillos'},
  {id:'Comidas',emoji:'🍽️',label:'Comidas'},
  {id:'Postres',emoji:'🍰',label:'Postres'},
  {id:'Pasteles',emoji:'🎂',label:'Pasteles'},
];
const CE={Bebidas:'🥤',Bocadillos:'🥪',Comidas:'🍽️',Postres:'🍰',Pasteles:'🎂'};
let items=[],curCat='Todas',srch='',editId=null,imgData=null,detailId=null;

function load(){try{const s=localStorage.getItem(SK);items=s?JSON.parse(s):[];}catch(e){items=[];}}
function save(){localStorage.setItem(SK,JSON.stringify(items));}
function nid(){return items.length?Math.max(...items.map(x=>x.id))+1:1;}
function filtered(){return items.filter(x=>{const mc=curCat==='Todas'||x.cat===curCat;const q=srch.toLowerCase();const ms=!q||x.name.toLowerCase().includes(q)||(x.desc||'').toLowerCase().includes(q);return mc&&ms;});}

function renderCats(){
  document.getElementById('catTabs').innerHTML=CATS.map(c=>
    `<div class="cat-pill${curCat===c.id?' active':''}" onclick="setCat('${c.id}')"><span class="cat-emoji">${c.emoji}</span><span class="cat-label">${c.label}</span></div>`
  ).join('');
}

function setCat(c){curCat=c;renderCats();renderGrid();}

function renderGrid(){
  const list=filtered();
  const g=document.getElementById('foodGrid');
  document.getElementById('sectionTitle').textContent=curCat;
  document.getElementById('itemCount').textContent=list.length;
  if(!list.length){
    g.innerHTML=`<div class="empty"><div class="big-e">${CE[curCat]||'🍽️'}</div><p style="color:var(--muted);font-size:14px">Aún no hay preparaciones aquí.<br>¡Agrega la primera!</p></div>`;
    return;
  }
  g.innerHTML=list.map((it,i)=>{
    const imgH=it.img?`<img src="${it.img}" alt="${it.name}" loading="lazy">`:`<div class="no-img">${CE[it.cat]||'🍴'}</div>`;
    return `<div class="food-card" onclick="openDetail(${it.id})" style="animation-delay:${i*0.05}s">
      <div class="card-img">${imgH}<div class="card-cat-badge">${it.cat}</div></div>
      <div class="card-body">
        <div class="card-name">${it.name}</div>
        ${it.desc?`<div class="card-desc">${it.desc}</div>`:''}
        ${it.price?`<div class="card-price">${it.price}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openDetail(id){
  const it=items.find(x=>x.id===id);if(!it)return;
  detailId=id;
  document.getElementById('detailCat').textContent=(CE[it.cat]||'')+' '+it.cat;
  document.getElementById('detailName').textContent=it.name;
  document.getElementById('detailPrice').textContent=it.price||'';
  document.getElementById('detailDesc').textContent=it.desc||'';
  const im=document.getElementById('detailImg'),ni=document.getElementById('detailNoImg');
  if(it.img){im.src=it.img;im.style.display='block';ni.style.display='none';}
  else{im.style.display='none';ni.style.display='flex';ni.textContent=CE[it.cat]||'🍴';}
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').scrollTop=0;
}

function closeDetail(){document.getElementById('detailPanel').classList.remove('open');}

document.getElementById('shareWA').onclick=()=>{
  const it=items.find(x=>x.id===detailId);if(!it)return;
  const t=`✨ *${it.name}*\n${it.cat}${it.price?' — '+it.price:''}${it.desc?'\n\n'+it.desc:''}\n\n🍽️ _Darling's Kitchen_`;
  window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');
};

document.getElementById('shareCopy').onclick=()=>{
  const it=items.find(x=>x.id===detailId);if(!it)return;
  const t=`✨ ${it.name}\n${it.cat}${it.price?' — '+it.price:''}${it.desc?'\n\n'+it.desc:''}\n\n🍽️ Darling's Kitchen`;
  navigator.clipboard.writeText(t).then(()=>toast('✅ Copiado al portapapeles')).catch(()=>toast('Usa el botón de WhatsApp'));
};

function openModal(id){
  editId=id||null;imgData=null;
  if(id){
    const it=items.find(x=>x.id===id);
    document.getElementById('modalTitle').textContent='Editar Preparación';
    document.getElementById('fName').value=it.name;
    document.getElementById('fCat').value=it.cat;
    document.getElementById('fDesc').value=it.desc||'';
    document.getElementById('fPrice').value=it.price||'';
    if(it.img){document.getElementById('previewImg').src=it.img;document.getElementById('imgPreview').style.display='block';document.getElementById('uploadPlaceholder').style.display='none';}
    else{document.getElementById('imgPreview').style.display='none';document.getElementById('uploadPlaceholder').style.display='flex';}
    document.getElementById('deleteBtn').style.display='block';
  }else{
    document.getElementById('modalTitle').textContent='Nueva Preparación';
    ['fName','fDesc','fPrice'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fCat').value='Comidas';
    document.getElementById('imgPreview').style.display='none';
    document.getElementById('uploadPlaceholder').style.display='flex';
    document.getElementById('deleteBtn').style.display='none';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

document.getElementById('imgFileInput').onchange=function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{imgData=ev.target.result;document.getElementById('previewImg').src=imgData;document.getElementById('imgPreview').style.display='block';document.getElementById('uploadPlaceholder').style.display='none';};
  r.readAsDataURL(f);
};

document.getElementById('saveBtn').onclick=()=>{
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('⚠️ Ingresa el nombre del plato');return;}
  const cat=document.getElementById('fCat').value,desc=document.getElementById('fDesc').value.trim(),price=document.getElementById('fPrice').value.trim();
  if(editId){
    const i=items.findIndex(x=>x.id===editId);
    if(i!==-1)items[i]={...items[i],name,cat,desc,price,img:imgData||items[i].img};
    toast('✅ Preparación actualizada');
  }else{
    items.push({id:nid(),name,cat,desc,price,img:imgData||null});
    toast('✅ Agregada al catálogo');
  }
  save();closeModal();renderGrid();
};

document.getElementById('deleteBtn').onclick=()=>{
  if(!editId||!confirm('¿Eliminar esta preparación?'))return;
  items=items.filter(x=>x.id!==editId);
  save();closeModal();renderGrid();toast('🗑️ Eliminado del catálogo');
};

document.getElementById('detailEditBtn').onclick=()=>{closeDetail();openModal(detailId);};
document.getElementById('detailBack').onclick=closeDetail;
document.getElementById('fabBtn').onclick=()=>openModal(null);
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();};
document.getElementById('searchInput').oninput=e=>{srch=e.target.value.trim();renderGrid();};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

load();renderCats();renderGrid();
</script>
</body>
</html>
