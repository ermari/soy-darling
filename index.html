<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Darling's Kitchen — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0805;--dark:#141008;--rich:#1c160e;
  --gold:#c9963a;--gold-light:#e8b85a;--cream:#faf5ea;
  --text:#2a2018;--muted:#7a6a50;--border:rgba(201,150,58,0.25);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);max-width:440px;margin:0 auto;overflow-x:hidden}

/* Hero & Logo */
.hero{background:var(--black);padding:30px 20px;text-align:center;position:relative}
.hero-bg{position:absolute;inset:0;background:linear-gradient(180deg,#0a0805 0%,#1c160e 100%)}
.logo-circle{position:relative;width:100px;height:100px;border-radius:50%;border:2px solid var(--gold);margin:0 auto 10px;overflow:hidden;background:var(--rich)}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.hero-name{position:relative;font-family:'Cormorant Garamond',serif;font-size:30px;color:white;font-weight:700}
.hero-name span{color:var(--gold-light);font-style:italic}

/* Buscador y Categorías */
.search-wrap{background:var(--rich);padding:10px 15px;position:sticky;top:0;z-index:100}
.search-inner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.1);border:1px solid var(--border);border-radius:30px;padding:8px 15px}
.search-inner input{flex:1;background:none;border:none;outline:none;color:white;font-size:14px}

.cats-scroll{display:flex;gap:10px;padding:15px;overflow-x:auto;background:var(--cream);scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 20px;background:white;border:1px solid var(--border);border-radius:20px;white-space:nowrap;font-size:13px;cursor:pointer}
.cat-btn.active{background:var(--black);color:var(--gold);border-color:var(--gold)}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 15px 100px}
.card{background:white;border-radius:var(--r);overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.05);border:1px solid var(--border);cursor:pointer}
.card-img{width:100%;aspect-ratio:1/1;background:#eee;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-info{padding:10px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;height:36px;overflow:hidden}
.card-price{color:var(--gold);font-weight:700;font-size:14px}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.overlay.open{display:flex}

/* Card Detalle Cliente */
.view-card{background:white;width:100%;max-width:350px;border-radius:20px;overflow:hidden;position:relative;animation:pop 0.3s ease}
.view-img{width:100%;aspect-ratio:1.2/1;background:#000}
.view-img img{width:100%;height:100%;object-fit:cover}
.view-content{padding:20px}
.view-title{font-family:'Cormorant Garamond',serif;font-size:24px;margin-bottom:5px}
.view-price{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:15px}
.order-box{background:var(--cream);padding:15px;border-radius:12px;margin-top:10px}
.order-box textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:inherit;font-size:13px;resize:none;margin-bottom:10px}
.btn-wa{width:100%;background:#25d366;color:white;border:none;padding:12px;border-radius:10px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}

/* Formulario Admin */
.modal-form{background:var(--cream);width:100%;max-width:380px;border-radius:20px;padding:25px}
input, select, textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid var(--border);font-family:inherit}
.btn-main{width:100%;padding:14px;background:var(--black);color:var(--gold);border:1px solid var(--gold);border-radius:10px;font-weight:700;cursor:pointer}

/* Botones Flotantes */
.admin-only{display:none}
body.is-admin .admin-only{display:flex}
.fab-add{position:fixed;bottom:30px;right:20px;background:var(--black);color:var(--gold);width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);z-index:200;align-items:center;justify-content:center;font-size:30px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.4)}

@keyframes pop{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-bg"></div>
  <div class="logo-circle">
  <img src="soy_DARLING.jpg" alt="Logo Soy Darling">
</div>
  <div class="hero-name">Soy <span>Darling</span></div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" id="searchInput" placeholder="¿Qué se te antoja hoy?">
  </div>
</div>

<div class="cats-scroll" id="catBar">
  <button class="cat-btn active" onclick="setCat('Todos')">Todos</button>
  <button class="cat-btn" onclick="setCat('Comidas')">Comidas</button>
  <button class="cat-btn" onclick="setCat('Bebidas')">Bebidas</button>
  <button class="cat-btn" onclick="setCat('Postres')">Postres</button>
  <button class="cat-btn" onclick="setCat('Bocadillos')">Bocadillos</button>
  <button class="cat-btn" onclick="setCat('Eventos')">Eventos</button>
</div>

<div class="grid" id="mainGrid"></div>

<div class="overlay" id="viewOverlay" onclick="closeOverlays(event)">
  <div class="view-card" onclick="event.stopPropagation()">
    <div class="view-img"><img id="vImg" src=""></div>
    <div class="view-content">
      <h2 class="view-title" id="vTitle">Nombre</h2>
      <div class="view-price" id="vPrice">C$ 0</div>
      <p id="vDesc" style="font-size:14px; color:gray; margin-bottom:15px"></p>
      
      <div class="order-box">
        <textarea id="clientNote" placeholder="Escribe aquí tu pedido o consulta..." rows="2"></textarea>
        <button class="btn-wa" id="btnSendWA">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="20" style="filter:invert(1)">
          PEDIR POR WHATSAPP
        </button>
      </div>
      <button onclick="document.getElementById('viewOverlay').classList.remove('open')" style="width:100%; background:none; border:none; margin-top:15px; color:gray; cursor:pointer">Cerrar</button>
    </div>
  </div>
</div>

<div class="overlay" id="adminOverlay" onclick="closeOverlays(event)">
  <div class="modal-form" onclick="event.stopPropagation()">
    <h3 id="formTitle" style="margin-bottom:15px; font-family:serif">Producto</h3>
    <input type="text" id="fName" placeholder="Nombre">
    <input type="text" id="fPrice" placeholder="Precio">
    <select id="fCat">
      <option value="Comidas">Comidas</option>
      <option value="Bebidas">Bebidas</option>
      <option value="Postres">Postres</option>
      <option value="Bocadillos">Bocadillos</option>
      <option value="Eventos">Eventos</option>
    </select>
    <textarea id="fDesc" placeholder="Descripción" rows="3"></textarea>
    <input type="file" id="fImg" accept="image/*">
    <button class="btn-main" id="btnSave">GUARDAR EN LA NUBE</button>
    <button id="btnDel" style="width:100%; background:none; border:none; color:red; margin-top:15px; cursor:pointer">ELIMINAR PRODUCTO</button>
    <button onclick="document.getElementById('adminOverlay').classList.remove('open')" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer">Cancelar</button>
  </div>
</div>

<button class="fab-add admin-only" id="btnAdd">+</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbd-LPbyW8ugPDbga0700sYRFbKTjxaHo",
    authDomain: "soy-darling.firebaseapp.com",
    projectId: "soy-darling",
    storageBucket: "soy-darling.firebasestorage.app",
    messagingSenderId: "365948585235",
    appId: "1:365948585235:web:f67789b233fd68d0e206e6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "productos");

  let localItems = [];
  let filterCat = "Todos";
  let editingId = null;
  let compressedImg = "";

  const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
  if(isAdmin) document.body.classList.add('is-admin');

  onSnapshot(colRef, (snap) => {
    localItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  function render() {
    const grid = document.getElementById('mainGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = localItems.filter(i => (filterCat === "Todos" || i.cat === filterCat) && i.name.toLowerCase().includes(search));

    grid.innerHTML = filtered.map(i => `
      <div class="card" onclick="handleItemClick('${i.id}')">
        <div class="card-img"><img src="${i.img || 'https://via.placeholder.com/300'}"></div>
        <div class="card-info">
          <div class="card-title">${i.name}</div>
          <div class="card-price">${i.price}</div>
        </div>
      </div>
    `).join('');
  }

  window.handleItemClick = (id) => {
    if(isAdmin) openEdit(id);
    else openView(id);
  };

  // VISTA CLIENTE + WHATSAPP
  function openView(id) {
    const i = localItems.find(x => x.id === id);
    document.getElementById('vImg').src = i.img || 'https://via.placeholder.com/300';
    document.getElementById('vTitle').innerText = i.name;
    document.getElementById('vPrice').innerText = i.price;
    document.getElementById('vDesc').innerText = i.desc || "";
    document.getElementById('clientNote').value = "";
    document.getElementById('viewOverlay').classList.add('open');

    document.getElementById('btnSendWA').onclick = () => {
      const note = document.getElementById('clientNote').value;
      const text = `Hola Darling's Kitchen! Me interesa este producto: *${i.name}* (${i.price}).\n\nNota: ${note}`;
      window.open(`https://wa.me/50557031282?text=${encodeURIComponent(text)}`, '_blank');
    };
  }

  // MODO ADMIN DIRECTO
  function openEdit(id) {
    editingId = id;
    const i = localItems.find(x => x.id === id);
    document.getElementById('fName').value = i.name;
    document.getElementById('fPrice').value = i.price;
    document.getElementById('fDesc').value = i.desc;
    document.getElementById('fCat').value = i.cat || "Comidas";
    compressedImg = i.img;
    document.getElementById('formTitle').innerText = "Editar Producto";
    document.getElementById('adminOverlay').classList.add('open');
  }

  document.getElementById('btnAdd').onclick = () => {
    editingId = null; compressedImg = "";
    document.getElementById('fName').value = "";
    document.getElementById('fPrice').value = "";
    document.getElementById('fDesc').value = "";
    document.getElementById('formTitle').innerText = "Nuevo Producto";
    document.getElementById('adminOverlay').classList.add('open');
  };

  window.closeOverlays = (e) => {
    if(e.target.classList.contains('overlay')) {
      document.getElementById('viewOverlay').classList.remove('open');
      document.getElementById('adminOverlay').classList.remove('open');
    }
  };

  // Compresor para celular
  document.getElementById('fImg').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (ev) => {
      const img = new Image();
      img.src = ev.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const width = 800; 
        const scale = width / img.width;
        canvas.width = width;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        compressedImg = canvas.toDataURL('image/jpeg', 0.7);
      };
    };
  };

  document.getElementById('btnSave').onclick = async () => {
    const data = {
      name: document.getElementById('fName').value,
      price: document.getElementById('fPrice').value,
      desc: document.getElementById('fDesc').value,
      cat: document.getElementById('fCat').value,
      img: compressedImg
    };
    if(editingId) await updateDoc(doc(db, "productos", editingId), data);
    else await addDoc(colRef, data);
    document.getElementById('adminOverlay').classList.remove('open');
  };

  document.getElementById('btnDel').onclick = async () => {
    if(confirm("¿Eliminar?")) {
      await deleteDoc(doc(db, "productos", editingId));
      document.getElementById('adminOverlay').classList.remove('open');
    }
  };

  window.setCat = (c) => {
    filterCat = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
    render();
  };

  document.getElementById('searchInput').oninput = render;
</script>
</body>
</html>
