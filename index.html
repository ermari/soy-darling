<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Darling's Kitchen — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9963a; --cream: #faf5ea; --text: #2a2018; --white: #ffffff;
  }
  body { font-family: 'Outfit', sans-serif; background: var(--cream); margin: 0; padding-bottom: 80px; }
  
  /* Encabezado más compacto */
  header { 
    background: var(--white); 
    padding: 15px; 
    text-align: center; 
    border-bottom: 1px solid var(--gold);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.2rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
  
  /* Grid de productos */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
  .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  .card img { width: 100%; height: 140px; object-fit: cover; }
  .card-info { padding: 10px; }
  .card-info h3 { font-size: 0.9rem; margin: 0 0 5px 0; }
  .price { color: var(--gold); font-weight: 600; }

  /* Botón WhatsApp Flotante */
  .btn-ws {
    position: fixed; bottom: 20px; right: 20px;
    background: #25d366; color: white; padding: 15px 20px;
    border-radius: 50px; text-decoration: none; font-weight: 600;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999;
    display: flex; align-items: center; gap: 8px;
  }

  /* Ocultar herramientas de edición por defecto */
  .admin-only { display: none; }
  
  /* Si la URL tiene ?admin=true se muestran */
  body.is-admin .admin-only { display: block; }
  
  #fabBtn { position: fixed; bottom: 90px; right: 20px; background: var(--gold); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; }
</style>
</head>
<body>

<header>
  <h1>Darling's Kitchen</h1>
  <input type="text" id="searchInput" placeholder="Buscar preparación..." style="width: 90%; margin-top: 10px; padding: 8px; border-radius: 20px; border: 1px solid #ddd;">
</header>

<div class="grid" id="grid"></div>

<a href="https://wa.me/50557031282?text=Hola!%20Me%20gustaría%20ordenar%20algo%20del%20catálogo" class="btn-ws" target="_blank">
  <span>Pedir por WhatsApp</span>
</a>

<button id="fabBtn" class="admin-only" onclick="openModal()">+</button>

<input type="file" id="fImg" accept="image/*" style="display:none"> 
<script>
  // Verificar si es administrador
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('admin') === 'true') {
    document.body.classList.add('is-admin');
  }

  let items = JSON.parse(localStorage.getItem('cat_darling') || '[]');

  function renderGrid() {
    const grid = document.getElementById('grid');
    const term = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = items.filter(i => i.name.toLowerCase().includes(term)).map(i => `
      <div class="card">
        <img src="${i.img || 'https://via.placeholder.com/150'}" onclick="${urlParams.get('admin') ? `editItem('${i.id}')` : ''}">
        <div class="card-info">
          <h3>${i.name}</h3>
          <p class="price">C$ ${i.price}</p>
          ${urlParams.get('admin') ? `<button onclick="deleteItem('${i.id}')" style="font-size:10px; color:red; border:none; background:none;">Eliminar</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Funciones de guardado (localStorage por ahora)
  // Para centralizar datos REALMENTE, necesitarás subir el archivo index.html 
  // con los datos ya escritos o usar una base de datos.
  
  renderGrid();
</script>
</body>
</html>
